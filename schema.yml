openapi: 3.0.3
info:
  title: Parcours Doctoral API
  version: 1.0.10
  description: This API delivers data for the Parcours Doctoral project.
  contact:
    name: UCLouvain - OSIS
    url: https://github.com/uclouvain/osis
paths:
  /autocomplete/person:
    get:
      operationId: autocomplete_person_list
      description: Autocomplete person
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: search
        required: true
        in: query
        description: The term to search the persons on (first or last name, or global
          id)
        schema:
          type: string
      tags:
      - autocomplete
      security:
      - tokenAuth: []
      - ESBAuthentication: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPersonList'
          description: ''
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /autocomplete/tutor:
