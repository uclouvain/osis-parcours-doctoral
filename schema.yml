components:
  schemas:
    ActionLink:
      type: object
      properties:
        error:
          type: string
        method:
          $ref: '#/components/schemas/MethodEnum'
        url:
          type: string
          format: uri
      oneOf:
      - required:
        - method
        - url
      - required:
        - error
    CreatablePapersTypesEnum:
      enum:
      - CONFIRMATION_PAPER
      - PRIVATE_DEFENSE
      - PUBLIC_DEFENSE
      type: string
      description: |-
        * `CONFIRMATION_PAPER` - Épreuve de confirmation
        * `PRIVATE_DEFENSE` - Défense privée
        * `PUBLIC_DEFENSE` - Soutenance publique
    DoctoralTrainingAssent:
      type: object
      properties:
        approbation:
          type: boolean
        commentaire:
          type: string
      required:
      - approbation
      - commentaire
    DoctoralTrainingBatch:
      type: object
      properties:
        activity_uuids:
          type: array
          items:
            type: string
      required:
      - activity_uuids
    DoctoralTrainingConfig:
      type: object
      properties:
        creatable_papers_types:
          type: array
          items:
            $ref: '#/components/schemas/CreatablePapersTypesEnum'
          readOnly: true
        is_complementary_training_enabled:
          type: boolean
          title: Activer l'onglet Formation complémentaire
        category_labels:
          title: Libellés de catégories
        conference_types:
          title: Types d'activité pour la catégorie Conférence
        conference_publication_types:
          title: Types d'activité pour une communication dans la catégorie Conférence
        communication_types:
          title: Types d'activité pour la catégorie Communication orale (hors conférence)
        seminar_types:
          title: 'Types d''activité pour la catégorie Séminaire de recherche : assistance'
        publication_types:
          title: Types d'activité pour la catégorie Publications
        service_types:
          title: Types d'activité pour la catégorie Service institutionnel, didactique
            et d'expertise scientifique
        residency_types:
          title: Types d'activité pour la catégorie Séjour de perfectionnement de
            recherche
        course_types:
          title: Types d'activité pour la catégorie Cours
        complementary_course_types:
          title: Type de cours pour la formation complémentaire
      required:
      - creatable_papers_types
    InscriptionEvaluationDTO:
      type: object
      description: |-
        A `DTOSerializer` is just a regular `Serializer`, except that:

        * A set of default fields are automatically populated from the Meta.source dataclass.
        * All fields are set to read-only if needed when Meta.read_only is True.
      properties:
        uuid:
          type: string
        uuid_activite:
          type: string
        session:
          type: string
        statut:
          type: string
        inscription_tardive:
          type: boolean
        code_unite_enseignement:
          type: string
        intitule_unite_enseignement:
          type: string
        annee_unite_enseignement:
          type: integer
      required:
      - annee_unite_enseignement
      - code_unite_enseignement
      - inscription_tardive
      - intitule_unite_enseignement
      - session
      - statut
      - uuid
      - uuid_activite
    MethodEnum:
      type: string
      enum:
      - DELETE
      - GET
      - PATCH
      - POST
      - PUT
    Nested:
      type: object
      description: |-
        A `DTOSerializer` is just a regular `Serializer`, except that:

        * A set of default fields are automatically populated from the Meta.source dataclass.
        * All fields are set to read-only if needed when Meta.read_only is True.
      properties:
        sigle:
          type: string
        code:
          type: string
        annee:
          type: integer
        intitule:
          type: string
        intitule_fr:
          type: string
        intitule_en:
          type: string
        entite_gestion:
          $ref: '#/components/schemas/Nested'
        campus:
          allOf:
          - $ref: '#/components/schemas/Nested'
          nullable: true
        type:
          type: string
      required:
      - annee
      - code
      - entite_gestion
      - intitule
      - intitule_en
      - intitule_fr
      - sigle
      - type
    PaginatedPersonList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=400&limit=100
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=200&limit=100
        results:
          type: array
          items:
            $ref: '#/components/schemas/Person'
    PaginatedTutorList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=400&limit=100
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=200&limit=100
        results:
          type: array
          items:
            $ref: '#/components/schemas/Tutor'
    ParcoursDoctoralDTO:
      type: object
      description: |-
        A `DTOSerializer` is just a regular `Serializer`, except that:

        * A set of default fields are automatically populated from the Meta.source dataclass.
        * All fields are set to read-only if needed when Meta.read_only is True.
      properties:
        uuid:
          type: string
        uuid_admission:
          type: string
        type_admission:
          type: string
        reference:
          type: string
        statut:
          type: string
        date_changement_statut:
          type: string
          format: date-time
          nullable: true
        justification:
          type: string
        intitule_secteur_formation:
          type: string
        cree_le:
          type: string
          format: date-time
        formation:
          $ref: '#/components/schemas/Nested'
        projet:
          $ref: '#/components/schemas/Nested'
        cotutelle:
          $ref: '#/components/schemas/Nested'
        financement:
          $ref: '#/components/schemas/Nested'
        photo_identite_doctorant:
          type: array
          items:
            type: string
        matricule_doctorant:
          type: string
        noma_doctorant:
          type: string
        genre_doctorant:
          type: string
        prenom_doctorant:
          type: string
        date_naissance_doctorant:
          type: string
          format: date
        lieu_naissance_doctorant:
          type: string
        pays_naissance_doctorant:
          type: string
        nom_doctorant:
          type: string
        commission_proximite:
          type: string
        date_admission_par_cdd:
          type: string
          format: date-time
          nullable: true
        links:
          allOf:
          - $ref: '#/components/schemas/ActionLink'
          readOnly: true
          default: {}
      required:
      - commission_proximite
      - cotutelle
      - cree_le
      - date_naissance_doctorant
      - financement
      - formation
      - genre_doctorant
      - intitule_secteur_formation
      - lieu_naissance_doctorant
      - links
      - matricule_doctorant
      - nom_doctorant
      - noma_doctorant
      - pays_naissance_doctorant
      - photo_identite_doctorant
      - prenom_doctorant
      - projet
      - reference
      - statut
      - type_admission
      - uuid
      - uuid_admission
    ParcoursDoctoralRechercheDTO:
      type: object
      description: |-
        A `DTOSerializer` is just a regular `Serializer`, except that:

        * A set of default fields are automatically populated from the Meta.source dataclass.
        * All fields are set to read-only if needed when Meta.read_only is True.
      properties:
        uuid:
          type: string
        reference:
          type: string
        statut:
          type: string
        formation:
          $ref: '#/components/schemas/Nested'
        matricule_doctorant:
          type: string
        genre_doctorant:
          type: string
        prenom_doctorant:
          type: string
        nom_doctorant:
          type: string
        cree_le:
          type: string
          format: date-time
        links:
          allOf:
          - $ref: '#/components/schemas/ActionLink'
          readOnly: true
          default: {}
      required:
      - cree_le
      - formation
      - genre_doctorant
      - links
      - matricule_doctorant
      - nom_doctorant
      - prenom_doctorant
      - reference
      - statut
      - uuid
    Person:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 50
        last_name:
          type: string
          maxLength: 50
        global_id:
          type: string
          nullable: true
          maxLength: 10
    Tutor:
      type: object
      properties:
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        global_id:
          type: string
          nullable: true
          readOnly: true
      required:
      - first_name
      - global_id
      - last_name
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
      - code
      - message
    AcceptedLanguageEnum:
      type: string
      enum:
      - en
      - fr-be
  securitySchemes:
    ESBAuthentication:
      type: apiKey
      in: header
      name: ESB
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
  parameters:
    X-User-FirstName:
      in: header
      name: X-User-FirstName
      schema:
        type: string
      required: false
    X-User-LastName:
      in: header
      name: X-User-LastName
      schema:
        type: string
      required: false
    X-User-Email:
      in: header
      name: X-User-Email
      schema:
        type: string
      required: false
    X-User-GlobalID:
      in: header
      name: X-User-GlobalID
      schema:
        type: string
      required: false
    Accept-Language:
      in: header
      name: Accept-Language
      description: The header advertises which languages the client is able to understand,
        and which locale variant is preferred. (By languages, we mean natural languages,
        such as English, and not programming languages.)
      schema:
        $ref: '#/components/schemas/AcceptedLanguageEnum'
      required: false
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The specified resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
